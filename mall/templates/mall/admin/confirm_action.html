{% extends "mall/admin/base_admin.html" %}
{% block title %}{{ title }} — Market Admin{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div style="max-width:520px;margin:1.5rem auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem;">
    <p style="font-size:.95rem;line-height:1.55;margin:0 0 1.25rem;">
        {{ message }}
    </p>
    <form method="post" style="display:flex;gap:.6rem;justify-content:flex-end;">
        {% csrf_token %}
        <a href="{% url cancel_url %}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-gold">Confirm</button>
    </form>
</div>
{% endblock %}
