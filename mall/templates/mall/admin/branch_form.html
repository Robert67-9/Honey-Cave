{% extends "mall/admin/base_admin.html" %}
{% block title %}{{ action }} Branch — Market Admin{% endblock %}
{% block page_title %}{{ action }} Branch{% endblock %}

{% block content %}
<div style="max-width:680px;">
    <a href="{% url 'admin_branches' %}" class="btn btn-ghost btn-sm" style="margin-bottom:1.5rem;display:inline-block;">← Back to Branches</a>

    <div class="card">
        <div class="card-header"><h2>Branch Details</h2></div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>Region</label>
                        <select name="region" required>
                            {% for key, name in region_choices %}
                            <option value="{{ key }}" {% if branch.region == key %}selected{% endif %}>{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Branch Type</label>
                        <select name="branch_type">
                            <option value="main"    {% if branch.branch_type == 'main'    %}selected{% endif %}>Main Branch</option>
                            <option value="express" {% if branch.branch_type == 'express' %}selected{% endif %}>Express Kiosk</option>
                            <option value="agent"   {% if branch.branch_type == 'agent'   %}selected{% endif %}>Mobile Agent Point</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Branch Name</label>
                        <input type="text" name="name" value="{{ branch.name|default:'' }}" placeholder="e.g. Market Kumasi Central" required style="grid-column:1/-1;">
                    </div>
                    </div>
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>Address</label>
                        <input type="text" name="address" value="{{ branch.address|default:'' }}" placeholder="Full street address" required>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" value="{{ branch.city|default:'' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" value="{{ branch.phone|default:'' }}" placeholder="+233 ...">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ branch.email|default:'' }}">
                    </div>
                    <div class="form-group">
                        <label>Opening Hours</label>
                        <input type="text" name="opening_hours" value="{{ branch.opening_hours|default:'Mon–Sat: 8am – 8pm | Sun: 10am – 6pm' }}">
                    </div>
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>Nearby Landmark</label>
                        <input type="text" name="landmark" value="{{ branch.landmark|default:'' }}" placeholder="e.g. Near Kejetia Market">
                    </div>
                    <div class="form-group">
                        <label>GPS Latitude <span style="color:var(--muted);font-size:0.8rem;">(optional — for nearest-branch detection)</span></label>
                        <input type="number" step="any" name="latitude" value="{{ branch.latitude|default:'' }}" placeholder="e.g. 5.6037">
                    </div>
                    <div class="form-group">
                        <label>GPS Longitude <span style="color:var(--muted);font-size:0.8rem;">(optional)</span></label>
                        <input type="number" step="any" name="longitude" value="{{ branch.longitude|default:'' }}" placeholder="e.g. -0.1870">
                    </div>
                    <div class="form-group" style="grid-column:1/-1;display:flex;align-items:center;gap:0.6rem;">
                        <input type="checkbox" name="is_active" id="is_active" {% if branch.is_active or not branch %}checked{% endif %} style="width:auto;">
                        <label for="is_active" style="text-transform:none;font-size:0.9rem;margin:0;">Branch is active (visible to customers)</label>
                    </div>
                </div>
                <div style="margin-top:1.5rem;display:flex;gap:1rem;">
                    <button type="submit" class="btn btn-gold">{{ action }} Branch</button>
                    <a href="{% url 'admin_branches' %}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
