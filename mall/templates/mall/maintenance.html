<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance — Honey Cave Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #C9A84C;
      --gold-light:  #E0C068;
      --dark:        #1A1410;
      --dark2:       #241c14;
      --bg:          #111008;
      --text:        rgba(255,255,255,0.88);
      --muted:       rgba(255,255,255,0.45);
      --border:      rgba(255,255,255,0.1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.25rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 30%, rgba(201,168,76,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(201,168,76,0.06) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
    }

    /* Logo / brand mark */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
      text-decoration: none;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--gold) 0%, #a07830 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      line-height: 1.1;
    }
    .brand-name span {
      display: block;
      font-size: 0.65rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 1px;
    }

    /* Gear animation */
    .gear-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      margin-bottom: 2rem;
    }
    .gear {
      font-size: 2.8rem;
      display: inline-block;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }
    .gear-a { animation: spin 4s linear infinite; }
    .gear-b { animation: spin 4s linear infinite reverse; font-size: 1.8rem; margin-top: 0.6rem; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 20px;
      padding: 0.35rem 0.9rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .badge::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      color: white;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    h1 em {
      color: var(--gold);
      font-style: italic;
    }

    .message {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      opacity: 0.3;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }

    /* Contact block */
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .contact-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      font-size: 0.85rem;
      color: var(--text);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .contact-chip:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.35);
    }

    /* Countdown timer */
    .eta-block {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
    }
    .eta-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }
    .eta-tiles {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }
    .eta-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
    }
    .eta-tile .num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      min-width: 2ch;
      text-align: center;
    }
    .eta-tile .lbl {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }
    .eta-sep { font-size: 1.5rem; color: var(--muted); align-self: flex-start; padding-top: 0.2rem; }

    /* Footer note */
    .footer-note {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1rem;
    }
    .footer-note a { color: var(--gold); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      .gear { font-size: 2.2rem; }
      .gear-b { font-size: 1.4rem; }
      .eta-tile .num { font-size: 1.5rem; }
      .eta-tile { min-width: 44px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">🏪</div>
      <div class="brand-name">
       Honey Cave Market
        <span>✦ Premium Shopping ✦</span>
      </div>
    </div>

    <!-- Animated gears -->
    <div class="gear-wrap">
      <span class="gear gear-a">⚙</span>
      <span class="gear gear-b">⚙</span>
    </div>

    <!-- Status badge -->
    <div class="badge">Maintenance in Progress</div>

    <!-- Headline -->
    <h1>We're <em>Levelling Up</em></h1>

    <!-- Message from admin -->
    <p class="message">{{ message }}</p>

    <!-- Countdown (counts down from 1 hour by default; resets on reload) -->
    <div class="eta-block">
      <div class="eta-label">Estimated time remaining</div>
      <div class="eta-tiles">
        <div class="eta-tile">
          <div class="num" id="et-h">06</div>
          <div class="lbl">Hours</div>
        </div>
        <div class="eta-sep">:</div>
        <div class="eta-tile">
          <div class="num" id="et-m">00</div>
          <div class="lbl">Mins</div>
        </div>
        <div class="eta-sep">:</div>
        <div class="eta-tile">
          <div class="num" id="et-s">00</div>
          <div class="lbl">Secs</div>
        </div>
      </div>
    </div>

    <div class="divider"><span>stay in touch</span></div>

    <!-- Contact chips -->
    <div class="contact-row">
      <a href="https://wa.me/233591784205" class="contact-chip" target="_blank" rel="noopener">
        💬 WhatsApp Us
      </a>
      <a href="mailto:support@honeycavemarket.com" class="contact-chip">
        ✉️ Email Support
      </a>
    </div>

    <p class="footer-note">
      Are you an admin?
      <a href="/login/?next=/panel/">Sign in to the panel</a>
    </p>

  </div>

  <script>
    // Countdown from 6 hours — purely cosmetic, refreshes on page load
    var ends = Date.now() + 6 * 60 * 60 * 1000;
    function tick() {
      var diff = Math.max(0, ends - Date.now());
      var h = Math.floor(diff / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var s = Math.floor((diff % 60000) / 1000);
      document.getElementById('et-h').textContent = String(h).padStart(2, '0');
      document.getElementById('et-m').textContent = String(m).padStart(2, '0');
      document.getElementById('et-s').textContent = String(s).padStart(2, '0');
      if (diff > 0) setTimeout(tick, 1000);
    }
    tick();
  </script>
</body>
</html>
