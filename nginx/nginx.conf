# ─────────────────────────────────────────────────────────────────────────────
#  Market — Nginx Main Configuration
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;          # one worker per CPU core
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;    # max simultaneous connections per worker
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;       # hide Nginx version from headers

    # ── Upload size limit (match Django setting) ───────────────────────────────
    client_max_body_size 5M;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Connection rate limiting ────────────────────────────────────────────────
    # 10 requests/second per IP (burst up to 20 queued)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Stricter zone for auth endpoints — 2 req/s
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # ── Virtual host configs ────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
