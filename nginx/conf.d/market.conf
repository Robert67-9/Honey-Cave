# ─────────────────────────────────────────────────────────────────────────────
#  Market — Virtual Host
#  Replace YOUR_DOMAIN with your actual domain e.g. market.com
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge (for free SSL certificates)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS Main Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL Certificates ─────────────────────────────────────────────────────
    # Option A: Let's Encrypt (recommended — free)
    #   Run: certbot certonly --nginx -d YOUR_DOMAIN
    #   Then update these paths:
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── SSL Hardening ────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;    # OCSP stapling — faster cert verification
    ssl_stapling_verify       on;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Block common attack patterns ──────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* (wp-admin|wp-login|xmlrpc|\.env|\.git) { return 444; }

    # ── Static files — served by Nginx (never hits Django) ───────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;                        # browser caches for 30 days
        add_header Cache-Control "public, immutable";
        access_log off;                     # don't clutter logs with static hits
    }

    # ── Media files — uploaded content ───────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Block execution of uploaded files (security)
        location ~* \.(php|py|sh|rb|pl)$ { return 403; }
        access_log off;
    }

    # ── Auth endpoints — stricter rate limit ─────────────────────────────────
    location ~ ^/(login|register|verify-otp|forgot-password|reset-password)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://web:8000;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── All other requests → Gunicorn ────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://web:8000;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }
}
